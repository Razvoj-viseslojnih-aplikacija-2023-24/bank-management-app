<div class="container">
    <h3 mat-dialog-title *ngIf="flag == 1">Add bank</h3>
    <h3 mat-dialog-title *ngIf="flag == 2">Update bank: {{data.name}}</h3>
    <h3 mat-dialog-title *ngIf="flag == 3">Delete bank with ID: {{data.id}}</h3>

    <form class="mat-dialog-content" #formControl="ngForm">
        <div class="form">
         <mat-form-field>
             <input matInput placeholder="Name" name="Name" [disabled]="flag==3" [(ngModel)]="data.name" required />
         </mat-form-field>
        </div>

        <div class="form">
            <mat-form-field>
                <input matInput placeholder="Contact" name="Contact" [disabled]="flag==3" [(ngModel)]="data.contact" required />
            </mat-form-field>
           </div>

        <div class="form">
            <mat-form-field>
                <input matInput placeholder="Tin" name="Tin" [disabled]="flag==3" [(ngModel)]="data.tin" required />
            </mat-form-field>
           </div>
    </form>
    
    <div class="mat-dialog-actions">
        <button matButton *ngIf="flag == 1" type="submit" mat-dialog-close="1" [disabled]="!formControl.valid" (click)="add()" >Save</button>
        <button matButton *ngIf="flag == 2" type="submit" mat-dialog-close="1" [disabled]="!formControl.valid" (click)="update()">Edit</button>
        <button matButton *ngIf="flag == 3" mat-dialog-close="1" (click)="delete()">Delete</button>
        <button matButton (click)="cancel()">Cancel</button>
    </div>
</div>
