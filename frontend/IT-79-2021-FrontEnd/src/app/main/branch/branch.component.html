<mat-toolbar color="primary">
  <span class="title-center"> Branch </span>
</mat-toolbar>
  
  <div class="container mat-elavation-z8">
    <div class="filter-field">
      <mat-form-field subscriptSizing="dynamic">
        <input matInput placeholder="Pretraga..." name="filterField"
        (keyup)="applyFilter($event)"/>
      </mat-form-field>
    </div>
    <mat-table [dataSource]="dataSource" class="mat-cell">
        <!--address-->
    <ng-container matColumnDef="address">
        <mat-header-cell *matHeaderCellDef>Address</mat-header-cell>
        <mat-cell *matCellDef="let row">{{ row.address }}</mat-cell>
      </ng-container>
      <!--id-->
      <ng-container matColumnDef="id">
        <mat-header-cell *matHeaderCellDef>ID</mat-header-cell>
        <mat-cell *matCellDef="let row">{{ row.id }}</mat-cell>
      </ng-container>
      <!-- counters -->
      <ng-container matColumnDef="counters">
        <mat-header-cell *matHeaderCellDef>counters</mat-header-cell>
        <mat-cell *matCellDef="let row">{{ row.counters }}</mat-cell>
      </ng-container>
      <!-- hasBoss -->
      <ng-container matColumnDef="hasBoss">
        <mat-header-cell *matHeaderCellDef>Has Boss</mat-header-cell>
        <mat-cell [style.color]="row.hasBoss? 'Green' : 'Red'" *matCellDef="let row">{{ row.hasBoss ? 'Da' : 'Ne' }}</mat-cell>
      </ng-container>
      <!--Bank-->
      <ng-container matColumnDef="bank">
        <mat-header-cell *matHeaderCellDef>Bank</mat-header-cell>
        <mat-cell *matCellDef="let row">{{ row.bank.name }}</mat-cell>
      </ng-container>
      <!-- Action Buttons -->
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>
            <button mat-icon-button color="accent" (click)="openDialog(1)">
                <mat-icon>add</mat-icon>
              </button>
            </mat-header-cell>
            <mat-cell *matCellDef="let row; let i = index">
              <button mat-icon-button color="accent" (click)="openDialog(2, row.id, row.address, row.counters, row.hasBoss, row.bank)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="openDialog(3, row.id, row.address, row.counters, row.hasBoss, row.bank)">
                <mat-icon>delete</mat-icon>
              </button>
            </mat-cell>
          </ng-container>
          <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
          <mat-row
            style="cursor: pointer;"
            *matRowDef="let row; columns: displayedColumns" (click)="selectRow(row)"></mat-row>
  
    </mat-table>
  </div>
  
  <div class ="container mat-elevation-z8">
    <app-bank-service *ngIf="parentSelectedBranch" [childSelectBranch]="parentSelectedBranch">
    </app-bank-service>
  </div>
