<mat-toolbar color="primary">
    <span class="title-center">Bank Service</span>
  </mat-toolbar>
  
  <div class="container mat-elavation-z8">
    <mat-table #table [dataSource]="dataSource" class="mat-cell">
      <!--ID-->
      <ng-container matColumnDef="id">
        <mat-header-cell *matHeaderCellDef>ID</mat-header-cell>
        <mat-cell *matCellDef="let row">{{ row.id }}</mat-cell>
      </ng-container>
        <!--name-->
      <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
        <mat-cell *matCellDef="let row">{{ row.name}}</mat-cell>
      </ng-container>
      <!--serviceDescription-->
      <ng-container matColumnDef="serviceDescription">
        <mat-header-cell *matHeaderCellDef>Service description</mat-header-cell>
        <mat-cell *matCellDef="let row">{{ row.serviceDescription}}</mat-cell>
      </ng-container>
      <!-- contractDate -->
      <ng-container matColumnDef="contractDate">
        <mat-header-cell *matHeaderCellDef> Contract date </mat-header-cell>
        <mat-cell *matCellDef="let row">  {{row.contractDate | date:'dd.MM.yyyy' }} </mat-cell>
      </ng-container>
      <!-- Commission -->
      <ng-container matColumnDef="commission">
        <mat-header-cell *matHeaderCellDef>Commission</mat-header-cell>
        <mat-cell *matCellDef="let row">{{ row.commission }}</mat-cell>
      </ng-container>
      <!-- User -->
      <ng-container matColumnDef="user">
        <mat-header-cell *matHeaderCellDef>UserID</mat-header-cell>
        <mat-cell *matCellDef="let row">{{ row.user.idNumber }}</mat-cell>
      </ng-container>
      <!-- Action Buttons -->
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>
          <button mat-icon-button color="accent" (click)="openDialog(1)">
            <mat-icon>add</mat-icon>
          </button>
        </mat-header-cell>
        <mat-cell *matCellDef="let row; let i = index">
          <button mat-icon-button color="primary" (click)="openDialog(2,row.id, row.name, row.serviceDescription, row.contractDate, row.commission, row.user)">
            <mat-icon color="primary" aria-label="Edit">edit</mat-icon>
          </button>
          <button mat-icon-button color="primary" (click)="openDialog(3,row.id, row.name, row.serviceDescription, row.contractDate, row.commission, row.user)">
            <mat-icon color= "warn" aria-label="Delete">delete</mat-icon>
          </button>
        </mat-cell>
      </ng-container>
      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row
        style="cursor: pointer;"
        *matRowDef="let row; columns: displayedColumns">
      </mat-row>
    </mat-table>
  </div>
